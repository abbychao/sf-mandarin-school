<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,500;0,700;1,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #FFFBF5;
    font-family: 'Inter', sans-serif;
    color: #2D2A26;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  /* Subtle top and bottom accent bars */
  .accent-bar {
    position: absolute;
    left: 0;
    right: 0;
    height: 6px;
    background: #BE3144;
  }
  .accent-bar.top { top: 0; }
  .accent-bar.bottom { bottom: 0; }

  .container {
    text-align: center;
    padding: 0 80px;
  }

  .chinese {
    font-family: 'Lora', serif;
    font-size: 30px;
    color: #BE3144;
    letter-spacing: 5px;
    margin-bottom: 20px;
  }

  .headline {
    font-family: 'Lora', Georgia, serif;
    font-size: 80px;
    font-weight: 700;
    line-height: 1.1;
    color: #2D2A26;
    margin-bottom: 48px;
  }

  .headline em {
    font-style: italic;
    font-weight: 600;
    color: #BE3144;
  }

  .launch {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #6B635A;
    margin-bottom: 8px;
  }

  .url {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: #6B635A;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="accent-bar top"></div>

  <div class="container">
    <div class="chinese">旧金山中文沉浸学校之友</div>
    <h1 class="headline">A Public Mandarin<br>Immersion K–8 <em>School</em><br>for SF</h1>
    <div class="launch">Target Launch 2027</div>

    <div class="url">sfmandarinschool.org</div>
  </div>

  <div class="accent-bar bottom"></div>
</body>
</html>
